<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>k6 Search Benchmark</title>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/sql-formatter@15.4.2/dist/sql-formatter.min.js"></script>
    <style>
      :root {
        --c1: #7c3aed;
        --c2: #f97316;
        --c3: #10b981;
        --c4: #ec4899;
        --c5: #3b82f6;
        --bg: #0f0f0f;
        --panel: #1a1a1a;
        --border: #2a2a2a;
        --text: #e5e5e5;
        --text-dim: #737373;
        --grid: #252525;
      }
      html.light {
        --bg: #fafafa;
        --panel: #ffffff;
        --border: #e5e5e5;
        --text: #171717;
        --text-dim: #737373;
        --grid: #f0f0f0;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "JetBrains Mono", monospace;
        background: var(--bg);
        color: var(--text);
        padding: 20px;
        min-height: 100vh;
        transition:
          background 0.3s,
          color 0.3s;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--border);
      }
      .header h1 {
        font-size: 20px;
        font-weight: 600;
      }
      .elapsed {
        font-size: 20px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
      }
      .theme-toggle {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px 12px;
        color: var(--text);
        font-family: inherit;
        font-size: 12px;
        cursor: pointer;
      }
      .theme-toggle:hover {
        border-color: var(--c1);
      }
      .stats-row {
        display: flex;
        gap: 16px;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }
      .stat-group {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        border-left: 3px solid var(--c1);
      }
      .stat-group-header {
        margin-bottom: 8px;
      }
      .stat-group-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 8px;
      }
      .stat {
        text-align: left;
      }
      .stat-value {
        font-size: 14px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
      }
      .stat-label {
        font-size: 9px;
        color: var(--text-dim);
        text-transform: uppercase;
      }
      .stat-group-header {
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .stat-group-header:hover {
        opacity: 0.8;
      }
      .expand-icon {
        font-size: 10px;
        transition: transform 0.2s;
      }
      .stat-group.expanded .expand-icon {
        transform: rotate(90deg);
      }
      .query-details {
        display: none;
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid var(--border);
      }
      .stat-group.expanded .query-details {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .query-item {
        background: var(--bg);
        border-radius: 4px;
        padding: 8px;
        cursor: pointer;
        position: relative;
      }
      .query-item:hover {
        background: var(--border);
      }
      .query-tooltip {
        display: none;
        position: fixed;
        right: 300px;
        top: 100px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        max-width: 500px;
        max-height: 400px;
        overflow: auto;
        z-index: 1000;
        font-size: 11px;
        white-space: pre-wrap;
        font-family: "JetBrains Mono", monospace;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      }
      .query-tooltip.visible {
        display: block;
      }
      .config-modal {
        display: none;
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px;
        min-width: 400px;
        max-width: 600px;
        max-height: 80vh;
        overflow: auto;
        z-index: 1001;
        font-size: 11px;
        font-family: "JetBrains Mono", monospace;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      }
      .config-modal.visible {
        display: block;
      }
      .config-modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border);
      }
      .config-modal-title {
        font-weight: 600;
        font-size: 13px;
      }
      .config-modal-close {
        background: none;
        border: none;
        color: var(--text-dim);
        font-size: 18px;
        cursor: pointer;
        padding: 0 4px;
      }
      .config-modal-close:hover {
        color: var(--text);
      }
      .config-item {
        display: flex;
        justify-content: space-between;
        padding: 4px 0;
        border-bottom: 1px solid var(--border);
      }
      .config-item:last-child {
        border-bottom: none;
      }
      .config-key {
        color: var(--text-dim);
      }
      .config-value {
        font-weight: 600;
        text-align: right;
        max-width: 60%;
        word-break: break-all;
      }
      .config-section {
        margin-top: 12px;
      }
      .config-section-title {
        font-weight: 600;
        margin-bottom: 6px;
        color: var(--c1);
      }
      .config-tabs {
        display: flex;
        gap: 4px;
        margin-bottom: 12px;
        border-bottom: 1px solid var(--border);
        padding-bottom: 8px;
      }
      .config-tab {
        background: none;
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 6px 12px;
        color: var(--text-dim);
        font-family: inherit;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        cursor: pointer;
      }
      .config-tab:hover {
        border-color: var(--c1);
        color: var(--text);
      }
      .config-tab.active {
        background: var(--c1);
        border-color: var(--c1);
        color: white;
      }
      .config-tab-content {
        display: none;
      }
      .config-tab-content.active {
        display: block;
      }
      .schema-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 10px;
      }
      .schema-table th,
      .schema-table td {
        padding: 4px 8px;
        text-align: left;
        border-bottom: 1px solid var(--border);
      }
      .schema-table th {
        color: var(--text-dim);
        font-weight: 600;
        text-transform: uppercase;
        font-size: 9px;
      }
      .index-def {
        background: var(--bg);
        padding: 8px;
        border-radius: 4px;
        margin-top: 8px;
        white-space: pre-wrap;
        word-break: break-all;
        font-size: 10px;
      }
      .index-name {
        font-weight: 600;
        color: var(--c1);
        margin-bottom: 4px;
      }
      .modal-backdrop {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
      }
      .modal-backdrop.visible {
        display: block;
      }
      .query-header {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 6px;
      }
      .query-name {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .query-info {
        font-size: 9px;
        font-weight: 400;
        color: var(--text-dim);
        margin-left: 12px;
        text-transform: none;
        letter-spacing: normal;
      }
      .query-stats {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 6px;
      }
      .query-stat-value {
        font-size: 11px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
      }
      .query-stat-label {
        font-size: 8px;
        color: var(--text-dim);
        text-transform: uppercase;
      }
      .chart-container {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 16px;
      }
      .chart-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }
      .chart-header h2 {
        font-size: 12px;
        font-weight: 600;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .chart-controls {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .reset-zoom {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 2px 8px;
        color: var(--text-dim);
        font-family: inherit;
        font-size: 9px;
        cursor: pointer;
        text-transform: uppercase;
        opacity: 0;
        transition: opacity 0.2s;
      }
      .reset-zoom.visible {
        opacity: 1;
      }
      .reset-zoom:hover {
        border-color: var(--c1);
        color: var(--text);
      }
      .chart-header select {
        background: var(--panel);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 2px 6px;
        font-size: 11px;
        font-family: inherit;
        cursor: pointer;
        text-transform: uppercase;
      }
      .legend {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: var(--text-dim);
        cursor: pointer;
        user-select: none;
      }
      .legend-item:hover {
        opacity: 0.8;
      }
      .legend-item.disabled {
        opacity: 0.4;
        text-decoration: line-through;
      }
      .legend-item.disabled .legend-color {
        opacity: 0.3;
      }
      .legend-color {
        width: 16px;
        height: 3px;
        border-radius: 1px;
      }
      .chart-wrapper {
        position: relative;
        height: clamp(140px, 30vh, 300px);
      }
      .chart-wrapper.small {
        height: clamp(80px, 14vh, 140px);
      }
      .main-row {
        display: grid;
        grid-template-columns: 1fr 340px;
        gap: 16px;
        margin-bottom: 16px;
      }
      .stats-column {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .stats-column .stat-group {
        min-width: unset;
        flex: unset;
      }
      .two-charts {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      @media (max-width: 1200px) {
        .main-row {
          grid-template-columns: 1fr 300px;
        }
        .query-stats {
          grid-template-columns: repeat(3, 1fr);
        }
      }
      @media (max-width: 1000px) {
        .main-row {
          grid-template-columns: 1fr 260px;
          gap: 12px;
        }
        body {
          padding: 16px;
        }
        .chart-container {
          padding: 14px;
        }
        .query-stat-value {
          font-size: 10px;
        }
        .query-stat-label {
          font-size: 7px;
        }
      }
      @media (max-width: 850px) {
        .main-row {
          grid-template-columns: 1fr;
        }
        .stats-column {
          flex-direction: row;
          flex-wrap: wrap;
        }
        .stats-column .stat-group {
          flex: 1;
          min-width: 280px;
        }
        .query-stats {
          grid-template-columns: repeat(6, 1fr);
        }
      }
      @media (max-width: 700px) {
        .two-charts {
          grid-template-columns: 1fr;
        }
        .stats-row {
          flex-direction: column;
        }
        body {
          padding: 12px;
        }
        .main-row {
          gap: 12px;
        }
        .chart-container {
          padding: 12px;
        }
        .stats-column .stat-group {
          min-width: 100%;
        }
        .query-stats {
          grid-template-columns: repeat(3, 1fr);
        }
      }
      #runs-container {
        display: contents;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>K6 Search Benchmark</h1>
      <div style="display: flex; align-items: center; gap: 16px">
        <div id="timeline-settings" style="font-size: 11px; color: var(--text-dim)"></div>
        <div class="elapsed" id="elapsed">00:00</div>
        <button class="theme-toggle" onclick="toggleTheme()">◐ Theme</button>
      </div>
    </div>

    <div id="notes-container" style="display: none; padding: 12px 16px; margin-bottom: 16px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; color: var(--text-dim); font-size: 13px;"></div>

    <div id="chart-groups-container"></div>

    <div class="main-row" id="ingest-container" style="display: none">
      <div class="chart-container">
        <div class="chart-header">
          <h2>Ingest (docs/s)</h2>
          <div class="chart-controls">
            <button class="reset-zoom" id="reset-ingest" onclick="resetZoom()">
              Reset Zoom
            </button>
            <div class="legend" id="ingest-legend"></div>
          </div>
        </div>
        <div class="chart-wrapper small">
          <canvas id="ingestChart"></canvas>
        </div>
      </div>
      <div class="stats-column" id="ingest-stats-container"></div>
    </div>

    <div class="two-charts" id="metrics-container" style="display: none">
      <div class="chart-container">
        <div class="chart-header">
          <h2>CPU %</h2>
          <button class="reset-zoom" id="reset-cpu" onclick="resetZoom()">
            Reset Zoom
          </button>
        </div>
        <div class="chart-wrapper small">
          <canvas id="cpuChart"></canvas>
        </div>
      </div>
      <div class="chart-container">
        <div class="chart-header">
          <h2>Memory</h2>
          <button class="reset-zoom" id="reset-memory" onclick="resetZoom()">
            Reset Zoom
          </button>
        </div>
        <div class="chart-wrapper small">
          <canvas id="memoryChart"></canvas>
        </div>
      </div>
    </div>

    <div id="query-tooltip" class="query-tooltip"></div>
    <div
      id="modal-backdrop"
      class="modal-backdrop"
      onclick="hideConfigModal()"
    ></div>
    <div id="config-modal" class="config-modal">
      <div class="config-modal-header">
        <span class="config-modal-title" id="config-modal-title"
          >Configuration</span
        >
        <button class="config-modal-close" onclick="hideConfigModal()">
          &times;
        </button>
      </div>
      <div id="config-modal-content"></div>
    </div>

    <script>
      const COLORS = [
        "#7C3AED",
        "#F97316",
        "#10B981",
        "#EC4899",
        "#3B82F6",
        "#EAB308",
        "#06B6D4",
      ];
      // Hardcoded brand colors per backend type
      const BACKEND_COLORS = {
        paradedb: "#7C3AED", // Purple (ParadeDB brand)
        postgresfts: "#3B82F6", // Blue
        : "#F97316", // Orange
        elasticsearch: "#10B981", // Green (Elastic brand)
        opensearch: "#EF4444", // Red (OpenSearch brand)
        clickhouse: "#FACC15", // Yellow (ClickHouse brand)
        mongodb: "#00ED64", // MongoDB Green (their actual brand green)
      };
      let isDark = false;
      let runColors = {};
      let selectedMetric = "p95";
      let lastMetric = "p95";
      let chartType = "latency"; // 'latency' or 'hits'
      let lastChartType = "latency";
      let colorIndex = 0;
      let lastElapsed = 0;
      let chartDuration = 30; // Will be updated from server
      let selectedQueries = new Set(); // Empty = show all (aggregated)
      let allQueryTypes = new Set();
      let lastData = null; // Store last data for filter updates
      let queryTexts = {}; // Store query text per query name
      let runConfigs = {}; // Store config per run name
      let chartInstances = {}; // Chart instances per dashboard group
      let chartLegendKeys = {}; // Legend keys per dashboard group
      let chartGroupOrder = []; // Track order of chart groups by first emission

      function resetState() {
        runColors = {};
        colorIndex = 0;
        lastElapsed = 0;
        chartDuration = 30;
        selectedQueries = new Set();
        allQueryTypes = new Set();
        lastData = null;
        queryTexts = {};
        runConfigs = {};
        isZoomed = false;
        chartType = "latency";
        lastChartType = "latency";
        document
          .querySelectorAll(".reset-zoom")
          .forEach((btn) => btn.classList.remove("visible"));
        document.getElementById("chart-groups-container").innerHTML = "";
        document.getElementById("ingest-legend").innerHTML = "";
        chartLegendKeys = {};
        document.getElementById("ingest-stats-container").innerHTML = "";
        document.getElementById("ingest-container").style.display = "none";
        // Destroy existing dashboard charts
        Object.values(chartInstances).forEach((chart) => chart.destroy());
        chartInstances = {};
        chartGroupOrder = [];
        [cpuChart, memoryChart, ingestChart].forEach((chart) => {
          chart.data.datasets = [];
          chart.options.scales.x.min = 0;
          chart.options.scales.x.max = chartDuration;
          delete chart.options.scales.y.max;
          chart.update("none");
        });
      }

      // Get base name without chart suffix (e.g., "paradedb-prod (chart)" -> "paradedb-prod")
      function getBaseName(run) {
        const match = run.match(/^(.+?) \(.+\)$/);
        return match ? match[1] : run;
      }

      function sanitizeColor(value) {
        const color = String(value || "").trim();
        if (/^#[0-9a-fA-F]{3,8}$/.test(color)) {
          return color;
        }
        if (/^(rgb|rgba|hsl|hsla)\([0-9.,%\s]+\)$/.test(color)) {
          return color;
        }
        // Allow named CSS colors (e.g. "red", "blue", "darkgreen")
        if (/^[a-zA-Z]{3,20}$/.test(color)) {
          return color;
        }
        return "";
      }

      function getRunColor(name, runData) {
        // Use base name for color so same backend has same color across charts
        const baseName = getBaseName(name);
        if (!runColors[baseName]) {
          // Check for custom color from backend options first
          if (runData?.color) {
            const customColor = sanitizeColor(runData.color);
            if (customColor) {
              runColors[baseName] = customColor;
            }
          }
          // Then check for backend-specific color
          if (!runColors[baseName] && runData?.backend && BACKEND_COLORS[runData.backend]) {
            runColors[baseName] = BACKEND_COLORS[runData.backend];
          }
          // Fall back to cycling colors
          if (!runColors[baseName]) {
            runColors[baseName] = COLORS[colorIndex % COLORS.length];
            colorIndex++;
          }
        }
        return runColors[baseName];
      }

      // Cache for container colors
      const containerColors = {};
      let containerColorIndex = 0;

      function getContainerColor(name, container) {
        // Check for custom color first
        if (container?.color) {
          const customColor = sanitizeColor(container.color);
          if (customColor) {
            containerColors[name] = customColor;
            return customColor;
          }
        }
        // Try to match with a run's color for consistency across panels
        if (lastData?.runs) {
          for (const [runName, runData] of Object.entries(lastData.runs)) {
            if (runData.backend === container?.backend || runData.container === name) {
              return getRunColor(runName, runData);
            }
          }
        }
        // Check for backend-specific color
        if (container?.backend && BACKEND_COLORS[container.backend]) {
          containerColors[name] = BACKEND_COLORS[container.backend];
          return BACKEND_COLORS[container.backend];
        }
        // Fall back to cycling colors (only cache if no backend info yet)
        if (!containerColors[name]) {
          containerColors[name] = COLORS[containerColorIndex % COLORS.length];
          containerColorIndex++;
        }
        return containerColors[name];
      }

      function shadeColor(color, percent) {
        // Lighten or darken a hex color
        const num = parseInt(color.replace("#", ""), 16);
        const amt = Math.round(2.55 * percent);
        const R = Math.min(255, Math.max(0, (num >> 16) + amt));
        const G = Math.min(255, Math.max(0, ((num >> 8) & 0x00ff) + amt));
        const B = Math.min(255, Math.max(0, (num & 0x0000ff) + amt));
        return (
          "#" + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1)
        );
      }

      function toggleTheme() {
        isDark = !isDark;
        document.documentElement.classList.toggle("light", !isDark);
        updateChartColors();
      }

      function getGridColor() {
        return isDark ? "#252525" : "#f0f0f0";
      }
      function getTickColor() {
        return "#737373";
      }

      function updateChartColors() {
        [
          ...Object.values(chartInstances),
          cpuChart,
          memoryChart,
          ingestChart,
        ].forEach((chart) => {
          chart.options.scales.x.grid.color = getGridColor();
          chart.options.scales.y.grid.color = getGridColor();
          chart.update("none");
        });
      }

      function createChartOptions(yUnit = "", chartId = "") {
        return {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          interaction: { mode: "nearest", axis: "x", intersect: true },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (ctx) =>
                  `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(2)}${yUnit}`,
                title: (items) =>
                  items.length ? `${items[0].parsed.x.toFixed(0)}s` : "",
              },
            },
            zoom: {
              zoom: {
                wheel: {
                  enabled: true,
                  modifierKey: "ctrl",
                },
                drag: {
                  enabled: true,
                  backgroundColor: "rgba(124, 58, 237, 0.1)",
                  borderColor: "rgba(124, 58, 237, 0.5)",
                  borderWidth: 1,
                },
                mode: "x",
                onZoomComplete: ({ chart }) => syncZoom(chart),
              },
              pan: {
                enabled: true,
                mode: "x",
                onPanComplete: ({ chart }) => syncZoom(chart),
              },
              limits: {
                x: { min: 0, minRange: 1 },
              },
            },
          },
          elements: {
            point: { radius: 0, hitRadius: 5, hoverRadius: 3 },
            line: { borderWidth: 2, tension: 0.3 },
          },
          scales: {
            x: {
              type: "linear",
              min: 0,
              max: chartDuration,
              grid: { color: getGridColor() },
              ticks: {
                color: getTickColor(),
                font: { family: "JetBrains Mono", size: 10 },
                maxTicksLimit: 8,
                callback: (v) => Math.round(v) + "s",
              },
            },
            y: {
              min: 0,
              suggestedMax: 10,
              grid: { color: getGridColor() },
              ticks: {
                color: getTickColor(),
                font: { family: "JetBrains Mono", size: 10 },
                maxTicksLimit: 6,
                callback: (v) => Math.round(v) + yUnit,
              },
            },
          },
        };
      }

      let isZoomed = false;

      // Calculate Y min/max for visible data points within X range
      function getVisibleYRange(chart, xMin, xMax) {
        let yMin = Infinity;
        let yMax = -Infinity;

        chart.data.datasets.forEach((dataset) => {
          if (dataset.hidden) return;
          dataset.data.forEach((point) => {
            if (point.x >= xMin && point.x <= xMax) {
              if (point.y < yMin) yMin = point.y;
              if (point.y > yMax) yMax = point.y;
            }
          });
        });

        if (yMin === Infinity) return null;

        // Add 10% padding
        const padding = (yMax - yMin) * 0.1 || 1;
        return { min: Math.max(0, yMin - padding), max: yMax + padding };
      }

      function getAllCharts() {
        return [
          ...Object.values(chartInstances),
          cpuChart,
          memoryChart,
          ingestChart,
        ];
      }

      function syncZoom(sourceChart) {
        const xMin = sourceChart.scales.x.min;
        const xMax = sourceChart.scales.x.max;

        // Only consider zoomed if not showing full extent
        const atFullExtent = xMin <= 0.1 && xMax >= chartDuration - 0.1;
        if (atFullExtent) {
          isZoomed = false;
          document
            .querySelectorAll(".reset-zoom")
            .forEach((btn) => btn.classList.remove("visible"));
          return;
        }

        isZoomed = true;
        document
          .querySelectorAll(".reset-zoom")
          .forEach((btn) => btn.classList.add("visible"));

        // Sync X axis to all charts first
        getAllCharts().forEach((chart) => {
          if (chart !== sourceChart) {
            chart.options.scales.x.min = xMin;
            chart.options.scales.x.max = xMax;
          }
        });

        // Defer Y axis recalculation to ensure zoom plugin has finished
        setTimeout(() => {
          getAllCharts().forEach((chart) => {
            const yRange = getVisibleYRange(chart, xMin, xMax);
            if (yRange) {
              chart.options.scales.y.min = yRange.min;
              chart.options.scales.y.max = yRange.max;
            }
            chart.update("none");
          });
        }, 0);
      }

      function resetZoom() {
        isZoomed = false;
        getAllCharts().forEach((chart) => {
          // Don't use chart.resetZoom() as it can be unreliable
          // Instead, explicitly reset all scale options
          chart.options.scales.x.min = 0;
          chart.options.scales.x.max = chartDuration;
          // Reset Y axis to auto-scale based on full dataset
          chart.options.scales.y.min = 0;
          chart.options.scales.y.max = getYMax(chart.data.datasets);
          // Force scales to update by triggering a full update
          chart.update("resize");
        });
        document
          .querySelectorAll(".reset-zoom")
          .forEach((btn) => btn.classList.remove("visible"));
      }

      // Create or get dashboard group section
      function getOrCreateChartGroup(chartName) {
        const groupId = chartName || "default";
        const safeGroupId = groupId.replace(/[^a-zA-Z0-9]/g, "_");

        if (chartInstances[groupId]) {
          return chartInstances[groupId];
        }

        // Track order of chart groups by first emission
        if (!chartGroupOrder.includes(groupId)) {
          chartGroupOrder.push(groupId);
        }

        const container = document.getElementById("chart-groups-container");
        const section = document.createElement("div");
        section.id = `chart-group-${safeGroupId}`;

        section.innerHTML = `
        <div class="chart-container">
          <div class="chart-header">

            <canvas id="chart-${safeGroupId}"></canvas>
          </div>
        </div>
        <div class="stats-column" id="stats-${safeGroupId}"></div>
      `;
        container.appendChild(section);

        // Sync select elements with current state
        const metricSelect = section.querySelector(
          `.metric-select[data-chart="${safeGroupId}"]`,
        );
        if (metricSelect) metricSelect.value = selectedMetric;
        const chartTypeSelect = section.querySelector(
          `.chart-type-select[data-chart="${safeGroupId}"]`,
        );
        if (chartTypeSelect) chartTypeSelect.value = chartType;
        if (metricSelect) {
          metricSelect.addEventListener("change", (event) =>

        }
        if (chartTypeSelect) {

            updateChartTypeForGroup(groupId, event.target.value),

        }
        // Sync metric wrapper visibility based on chart type
        const metricWrapper = section.querySelector('.metric-wrapper');
        const hitsUnit = section.querySelector('.hits-unit');
        if (chartType === 'hits') {
          if (metricWrapper) metricWrapper.style.display = 'none';
          if (hitsUnit) hitsUnit.style.display = 'inline';
        } else {
          if (metricWrapper) metricWrapper.style.display = 'inline';
          if (hitsUnit) hitsUnit.style.display = 'none';
        }

        // Create chart instance
        const canvas = document.getElementById(`chart-${safeGroupId}`);
        const chart = new Chart(canvas, {
          type: "line",
          data: { datasets: [] },
          options: createChartOptions("ms", groupId),
        });

        // Add double-click to reset zoom
        canvas.addEventListener("dblclick", resetZoom);

        chartInstances[groupId] = chart;
        chartLegendKeys[groupId] = "";

        return chart;
      }

      // Add double-click to reset zoom on all charts
      ["cpuChart", "memoryChart", "ingestChart"].forEach((id) => {

      function getYMax(datasets) {
        let max = 0;
        datasets.forEach((ds) =>
          ds.data.forEach((p) => {
            if (p.y > max) max = p.y;
          }),
        );
        return max > 0 ? max * 1.2 : 10;
      }

      // Update Y axis based on zoom state
      function updateChartYAxis(chart) {
        if (isZoomed) {
          // When zoomed, recalculate Y range for visible data
          const xMin = chart.options.scales.x.min;
          const xMax = chart.options.scales.x.max;
          const yRange = getVisibleYRange(chart, xMin, xMax);
          if (yRange) {
            chart.options.scales.y.min = yRange.min;
            chart.options.scales.y.max = yRange.max;
          }
        } else {
          // When not zoomed, auto-scale to full dataset
          chart.options.scales.y.min = 0;
          chart.options.scales.y.max = getYMax(chart.data.datasets);
        }
      }

      // Update chart datasets in place to preserve hover state
      function updateChartDatasets(chart, newDatasets, forceReplace = false) {
        const getDatasetKey = (ds) => ds.datasetKey || ds.label;
        const existingLabels = new Set(
          chart.data.datasets.map((ds) => getDatasetKey(ds)),
        );
        const newLabels = new Set(newDatasets.map((ds) => getDatasetKey(ds)));

        // Update existing datasets
        chart.data.datasets.forEach((ds) => {
          const datasetKey = getDatasetKey(ds);
          const newDs = newDatasets.find((n) => getDatasetKey(n) === datasetKey);
          if (newDs) {
            if (forceReplace) {
              // Full replace when metric changes
              ds.data.length = 0;
              newDs.data.forEach((pt) => ds.data.push(pt));
            } else {
              // Only push new points to preserve hover state
              const lastTime =
                ds.data.length > 0 ? ds.data[ds.data.length - 1].x : 0;
              newDs.data.forEach((pt) => {
                if (pt.x > lastTime) {
                  ds.data.push(pt);
                }
              });
            }
            ds.borderColor = newDs.borderColor;
            ds.backgroundColor = newDs.backgroundColor;
            // Copy scriptable pointRadius function
            if (newDs.pointRadius) {
              ds.pointRadius = newDs.pointRadius;
            }
            ds.label = newDs.label;
            ds.datasetKey = newDs.datasetKey;
          }
        });

        // Add new datasets
        newDatasets.forEach((ds) => {
          if (!existingLabels.has(getDatasetKey(ds))) {
            chart.data.datasets.push(ds);
          }
        });

        // Remove datasets that no longer exist (in place)
        for (let i = chart.data.datasets.length - 1; i >= 0; i--) {
          if (!newLabels.has(getDatasetKey(chart.data.datasets[i]))) {
            chart.data.datasets.splice(i, 1);
          }
        }
      }

      function formatElapsed(seconds) {
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return `${m.toString().padStart(2, "0")}:${s.toString().padStart(2, "0")}`;
      }

      function formatNumber(n) {
        if (!n && n !== 0) return "-";
        if (n >= 1000000) return (n / 1000000).toFixed(1) + "M";
        if (n >= 1000) return (n / 1000).toFixed(1) + "K";
        return Math.floor(n).toString();
      }

      function safeId(value) {
        return String(value).replace(/[^a-zA-Z0-9_-]/g, "_");
      }

      function formatLatency(ms) {
        if (!ms) return "-";
        if (ms >= 10000) return (ms / 1000).toFixed(1) + "s";
        if (ms >= 1000) return (ms / 1000).toFixed(2) + "s";
        if (ms >= 100) return Math.round(ms) + "ms";
        if (ms >= 10) return ms.toFixed(0) + "ms";
        return ms.toFixed(1) + "ms";
      }

      function hasQueries(run) {
        // Show run if it has any queries (even without timeline data yet)
        return Object.keys(run.queries || {}).length > 0;
      }

      function hasQueryTimelines(run) {
        return Object.values(run.queries || {}).some(
          (q) => q.timeline?.length > 0,
        );
      }

      function updateStats(runs) {
        // Group runs by chart (show runs with queries even before timeline data)
        const runsByChart = {};
        Object.keys(runs)
          .filter((name) => hasQueries(runs[name]))
          .sort()
          .forEach((name) => {
            const run = runs[name];
            const chartGroup = run.chart || "default";
            if (!runsByChart[chartGroup]) {
              runsByChart[chartGroup] = [];
            }
            runsByChart[chartGroup].push(name);
          });

        // Calculate earliest start time per chart group
        const chartStartTimes = {};
        Object.keys(runsByChart).forEach((chartGroup) => {
          chartStartTimes[chartGroup] = Infinity;
          runsByChart[chartGroup].forEach((name) => {
            const run = runs[name];
            if (run.startTime && run.startTime < chartStartTimes[chartGroup]) {
              chartStartTimes[chartGroup] = run.startTime;
            }
          });
        });

        // Update stats for each chart group (in emission order by start time)
        const sortedChartGroups = Object.keys(runsByChart).sort((a, b) => {
          const aTime = chartStartTimes[a] || Infinity;
          const bTime = chartStartTimes[b] || Infinity;
          if (aTime === bTime) return a.localeCompare(b);
          return aTime - bTime;
        });
        sortedChartGroups.forEach((chartGroup) => {
            const safeChartId = (chartGroup || "default").replace(
              /[^a-zA-Z0-9]/g,
              "_",
            );
            // Ensure chart group exists
            getOrCreateChartGroup(chartGroup === "default" ? "" : chartGroup);
            const container = document.getElementById(`stats-${safeChartId}`);
            if (!container) return;

            // Sort backends by selected metric (fastest first)
            const sortedBackends = runsByChart[chartGroup].slice().sort((a, b) => {
              const runA = runs[a];
              const runB = runs[b];
              // Get average metric across all queries for each backend
              const getAvgMetric = (run) => {
                const queries = run.queries || {};
                const values = Object.values(queries)
                  .map(q => q[selectedMetric])
                  .filter(v => v != null && v > 0);
                return values.length > 0 ? values.reduce((s, v) => s + v, 0) / values.length : Infinity;
              };
              return getAvgMetric(runA) - getAvgMetric(runB);
            });

            sortedBackends.forEach((name, idx) => {
              const run = runs[name];
              const color = getRunColor(name, run);
              const safeNameId = safeId(name);
              const statId = `stat-${safeNameId}`;
              const queryContainerId = `${safeNameId}-queries`;

              // Store config if available
              if (run.config && Object.keys(run.config).length > 0) {
                runConfigs[name] = run.config;
              }

              const labelId = `label-${safeNameId}`;
              let el = document.getElementById(statId);

              if (!el) {
                el = document.createElement("div");
                el.id = statId;
                el.className = "stat-group expanded";
                el.style.borderLeftColor = color;

                // Build limits string
                let limitsStr = "";
                if (run.containerLimits) {
                  const parts = [];
                  if (run.containerLimits.cpu_limit)
                    parts.push(escapeHtml(run.containerLimits.cpu_limit));
                  if (run.containerLimits.memory_limit)
                    parts.push(escapeHtml(run.containerLimits.memory_limit));
                  if (parts.length > 0)
                    limitsStr = `<span style="color: var(--text-dim); font-size: 9px; margin-left: 8px;">${parts.join(" / ")}</span>`;
                }

                el.innerHTML = `
              <div class="stat-group-header">
                <div id="${labelId}" class="stat-group-label" style="color: ${color};">${escapeHtml(getBaseName(name))}</div>${limitsStr}
              </div>
              <div class="query-details" id="${queryContainerId}"></div>
            `;
                container.appendChild(el);
              }

              // Set up config click handler after element is in the DOM.
              // Runs on every update so it works even if config arrives later.
              const hasConfig = run.config && Object.keys(run.config).length > 0;
              if (hasConfig) {
                const labelEl = document.getElementById(labelId);
                if (labelEl && !labelEl.dataset.configHandler) {
                  labelEl.style.cursor = "pointer";
                  labelEl.style.textDecoration = "underline";
                  labelEl.style.textDecorationStyle = "dotted";
                  labelEl.addEventListener("click", () => showConfigModal(name));
                  labelEl.dataset.configHandler = "1";
                }
              }

              // Update query details - only create if not exists, then just update values
              const queriesEl = document.getElementById(queryContainerId);
              const queries = run.queries || {};
              const queryNames = Object.keys(queries).sort();

              queryNames.forEach((qName) => {
                const q = queries[qName];
                const queryKey = `${name}::${qName}`;
                const queryId = `${safeNameId}-${safeId(qName)}`;
                let queryEl = document.getElementById(queryId);

                // Store query text if available
                if (q.query) {
                  queryTexts[queryKey] = q.query;
                }

                if (!queryEl) {
                  // Create new query item
                  queryEl = document.createElement("div");
                  queryEl.id = queryId;
                  queryEl.className = "query-item";
                  queryEl.dataset.query = qName;

                  // Build info string with VUs and executor if available
                  const infoParts = [];
                  if (q.vus) infoParts.push(`${q.vus} VUs`);
                  if (q.executor) infoParts.push(q.executor);
                  const infoStr =
                    infoParts.length > 0
                      ? `<span class="query-info">${infoParts.map(escapeHtml).join(" · ")}</span>`
                      : "";

                  queryEl.innerHTML = `
                <div class="query-header">
                  <div class="query-name">${escapeHtml(qName)}${infoStr}</div>
                </div>
                <div class="query-stats">
                  <div><div class="query-stat-value" id="${queryId}-qps">0</div><div class="query-stat-label">QPS</div></div>
                  <div><div class="query-stat-value" id="${queryId}-min">0</div><div class="query-stat-label">Min</div></div>
                  <div><div class="query-stat-value" id="${queryId}-p50">0</div><div class="query-stat-label">P50</div></div>
                  <div><div class="query-stat-value" id="${queryId}-p95">0</div><div class="query-stat-label">P95</div></div>
                  <div><div class="query-stat-value" id="${queryId}-p99">0</div><div class="query-stat-label">P99</div></div>
                  <div><div class="query-stat-value" id="${queryId}-max">0</div><div class="query-stat-label">Max</div></div>
                </div>
              `;
                  queryEl.addEventListener("click", () =>
                    showQueryModal(queryKey, qName),
                  );
                  queriesEl.appendChild(queryEl);
                }

                // Update values only
                document.getElementById(`${queryId}-qps`).textContent =
                  formatNumber(q.qps || 0);
                document.getElementById(`${queryId}-min`).textContent =
                  formatLatency(q.min);
                document.getElementById(`${queryId}-p50`).textContent =
                  formatLatency(q.p50);
                document.getElementById(`${queryId}-p95`).textContent =
                  formatLatency(q.p95);
                document.getElementById(`${queryId}-p99`).textContent =
                  formatLatency(q.p99);
                document.getElementById(`${queryId}-max`).textContent =
                  formatLatency(q.max);
              });
            });
          });
      }

      function updateLegend(runs) {
        // Group runs by chart (show runs with queries even before timeline data)
        const runsByChart = {};
        Object.keys(runs)
          .filter((name) => hasQueries(runs[name]))
          .sort()
          .forEach((name) => {
            const run = runs[name];
            const chartGroup = run.chart || "default";
            if (!runsByChart[chartGroup]) {
              runsByChart[chartGroup] = [];
            }
            runsByChart[chartGroup].push(name);
          });

        // Calculate earliest start time per chart group
        const chartStartTimes = {};
        Object.keys(runsByChart).forEach((chartGroup) => {
          chartStartTimes[chartGroup] = Infinity;
          runsByChart[chartGroup].forEach((name) => {
            const run = runs[name];
            if (run.startTime && run.startTime < chartStartTimes[chartGroup]) {
              chartStartTimes[chartGroup] = run.startTime;
            }
          });
        });

        // Update legend for each chart group (in emission order by start time)
        const sortedChartGroups = Object.keys(runsByChart).sort((a, b) => {
          const aTime = chartStartTimes[a] || Infinity;
          const bTime = chartStartTimes[b] || Infinity;
          if (aTime === bTime) return a.localeCompare(b);
          return aTime - bTime;
        });
        sortedChartGroups.forEach((chartGroup) => {
            const safeChartId = (chartGroup || "default").replace(
              /[^a-zA-Z0-9]/g,
              "_",
            );
            const legend = document.getElementById(`legend-${safeChartId}`);
            if (!legend) return;

            const runNames = runsByChart[chartGroup].slice().sort();

            // Build a key to detect if legend structure changed
            const queryList = [];
            runNames.forEach((name) => {
              const queries = runs[name].queries || {};
              Object.keys(queries)
                .sort()
                .forEach((qName) => queryList.push(qName));
            });
            const legendKey =
              queryList.join(",") +
              "|" +
              Array.from(selectedQueries).sort().join(",");

            // Only rebuild if structure changed
            if (legendKey === chartLegendKeys[chartGroup]) return;
            chartLegendKeys[chartGroup] = legendKey;

            const items = [];
            runNames.forEach((name) => {
              const run = runs[name];
              const baseColor = getRunColor(name, run);
              const queries = run.queries || {};
              const queryNames = Object.keys(queries).sort();

              queryNames.forEach((qName, idx) => {
                const color =
                  idx === 0 ? baseColor : shadeColor(baseColor, idx * 15);
                const isEnabled = selectedQueries.has(qName);
                const disabledClass = isEnabled ? "" : " disabled";
                items.push(
                  `<div class="legend-item${disabledClass}" data-query="${escapeHtml(qName)}" title="Click to toggle, Shift+click to isolate"><div class="legend-color" style="background: ${color}"></div> ${escapeHtml(qName)}</div>`,
                );
              });
            });
            legend.innerHTML = items.join("");
            legend.querySelectorAll(".legend-item").forEach((item) => {
              item.addEventListener("click", (event) => {
                toggleQueryFilter(item.dataset.query, event);
              });
            });
          });
      }

      function updateQueryFilters(runs) {
        // Collect all query names across all runs
        const queryNames = new Set();
        Object.values(runs).forEach((run) => {
          Object.keys(run.queries || {}).forEach((qName) => {
            queryNames.add(qName);
          });
        });

        // Initialize selectedQueries with all queries when first discovered
        queryNames.forEach((qn) => {
          if (!allQueryTypes.has(qn)) {
            selectedQueries.add(qn);
          }
        });
        allQueryTypes = queryNames;
      }

      function formatQueryText(queryText) {
        const trimmed = queryText.trim();
        // Try JSON first
        if (trimmed.startsWith('{') || trimmed.startsWith('[')) {
          try {
            const parsed = JSON.parse(trimmed);
            return JSON.stringify(parsed, null, 2);
          } catch (e) {
            // Not valid JSON, continue
          }
        }
        // Try SQL formatting
        try {
          return sqlFormatter.format(trimmed, {
            language: 'postgresql',
            tabWidth: 2,
            keywordCase: 'upper',
          });
        } catch (e) {
          // Fallback to original
          return queryText;
        }
      }

      function showQueryModal(queryKey, qName) {
        const queryText = queryTexts[queryKey];
        if (!queryText) return;

        const formatted = formatQueryText(queryText);
        document.getElementById("config-modal-title").textContent = qName;
        document.getElementById("config-modal-content").innerHTML = `
          <pre style="white-space: pre-wrap; word-break: break-word; font-size: 11px; margin: 0; background: var(--bg); padding: 12px; border-radius: 4px;">${escapeHtml(formatted)}</pre>
        `;
        document.getElementById("modal-backdrop").classList.add("visible");
        document.getElementById("config-modal").classList.add("visible");
      }

      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      function showConfigModal(runName) {
        const config = runConfigs[runName];
        if (!config || Object.keys(config).length === 0) {
          return; // No config available
        }

        document.getElementById("config-modal-title").textContent = runName;

        // Separate config into tabs
        const preScript = config.pre_script;
        const postScript = config.post_script;

        // Build tabs
        let tabsHtml = '<div class="config-tabs">';
        tabsHtml +=
          '<button class="config-tab active" onclick="switchConfigTab(\'config\')">Config</button>';
        if (preScript) {
          tabsHtml +=
            '<button class="config-tab" onclick="switchConfigTab(\'pre\')">Pre</button>';
        }
        if (postScript) {
          tabsHtml +=
            '<button class="config-tab" onclick="switchConfigTab(\'post\')">Post</button>';
        }
        tabsHtml += "</div>";

        // Helper to format config values
        function formatConfigValue(val) {
          if (val === null || val === undefined) return "-";
          if (typeof val === "object") return JSON.stringify(val);
          return String(val);
        }

        // Config tab content
        let configHtml =
          '<div id="tab-config" class="config-tab-content active">';
        for (const [section, value] of Object.entries(config)) {
          // Skip sections that have their own tabs
          if (["pre_script", "post_script"].includes(section)) continue;

          if (
            typeof value === "object" &&
            value !== null &&
            !Array.isArray(value)
          ) {
            configHtml += `<div class="config-section">
            <div class="config-section-title">${escapeHtml(section)}</div>`;
            for (const [key, val] of Object.entries(value)) {
              configHtml += `<div class="config-item">
              <span class="config-key">${escapeHtml(key)}</span>
              <span class="config-value">${escapeHtml(formatConfigValue(val))}</span>
            </div>`;
            }
            configHtml += "</div>";
          } else if (!Array.isArray(value)) {
            configHtml += `<div class="config-item">
            <span class="config-key">${escapeHtml(section)}</span>
            <span class="config-value">${escapeHtml(formatConfigValue(value))}</span>
          </div>`;
          }
        }
        configHtml += "</div>";

        // Pre script tab content
        let preHtml = '<div id="tab-pre" class="config-tab-content">';
        if (preScript) {
          preHtml += `<pre style="white-space: pre-wrap; word-break: break-word; font-size: 10px; margin: 0; background: var(--bg); padding: 12px; border-radius: 4px;">${escapeHtml(preScript)}</pre>`;
        }
        preHtml += "</div>";

        // Post script tab content
        let postHtml = '<div id="tab-post" class="config-tab-content">';
        if (postScript) {
          postHtml += `<pre style="white-space: pre-wrap; word-break: break-word; font-size: 10px; margin: 0; background: var(--bg); padding: 12px; border-radius: 4px;">${escapeHtml(postScript)}</pre>`;
        }
        postHtml += "</div>";

        document.getElementById("config-modal-content").innerHTML =
          tabsHtml + configHtml + preHtml + postHtml;
        document.getElementById("modal-backdrop").classList.add("visible");
        document.getElementById("config-modal").classList.add("visible");
      }

      function switchConfigTab(tabName) {
        // Update tab buttons
        document.querySelectorAll(".config-tab").forEach((btn) => {
          btn.classList.toggle(
            "active",
            btn.textContent.toLowerCase() === tabName,
          );
        });
        // Update tab content
        document.querySelectorAll(".config-tab-content").forEach((content) => {
          content.classList.toggle("active", content.id === "tab-" + tabName);
        });
      }

      function hideConfigModal() {
        document.getElementById("modal-backdrop").classList.remove("visible");
        document.getElementById("config-modal").classList.remove("visible");
      }

      function toggleQueryFilter(queryName, event) {
        if (event && event.shiftKey) {
          // Shift+click: isolate this query (show only this one)
          if (selectedQueries.size === 1 && selectedQueries.has(queryName)) {
            // Already isolated - restore all
            allQueryTypes.forEach((q) => selectedQueries.add(q));
          } else {
            // Isolate this query
            selectedQueries.clear();
            selectedQueries.add(queryName);
          }
        } else {
          // Regular click: toggle visibility
          if (selectedQueries.has(queryName)) {
            selectedQueries.delete(queryName);
          } else {
            selectedQueries.add(queryName);
          }
        }
        // Re-render chart with updated filters
        if (lastData) {
          update(lastData);
        }
        // Recalculate Y axis if zoomed
        if (isZoomed) {
          setTimeout(() => {
            getAllCharts().forEach((chart) => {
              const xMin = chart.options.scales.x.min;
              const xMax = chart.options.scales.x.max;
              const yRange = getVisibleYRange(chart, xMin, xMax);
              if (yRange) {
                chart.options.scales.y.min = yRange.min;
                chart.options.scales.y.max = yRange.max;
              }
              chart.update("none");
            });
          }, 0);
        }
      }

      function update(data) {
        // Store for filter updates
        lastData = data;

        // Detect restart: elapsed time went backwards
        if (data.elapsed < lastElapsed - 1) {
          resetState();
        }
        lastElapsed = data.elapsed;

        // Update chart duration from server
        if (data.chartDuration && data.chartDuration > chartDuration) {
          chartDuration = data.chartDuration;
          // Only auto-scroll when not zoomed
          if (!isZoomed) {
            getAllCharts().forEach((chart) => {
              chart.options.scales.x.min = 0;
              chart.options.scales.x.max = chartDuration;
            });
          }
        }

        document.getElementById("elapsed").textContent = formatElapsed(
          data.elapsed,
        );

        // Display timeline settings if present
        const settingsEl = document.getElementById("timeline-settings");
        if (data.broadcastInterval != null || data.timelineWindow != null) {
          const parts = [];
          if (data.broadcastInterval != null) parts.push("updating every " + data.broadcastInterval + "ms");
          if (data.timelineWindow != null) parts.push(data.timelineWindow === 0 ? "no smoothing" : "smoothed over " + data.timelineWindow + "ms");
          settingsEl.textContent = parts.join(", ");
        }

        // Display notes if present
        const notesContainer = document.getElementById("notes-container");
        if (data.notes) {
          notesContainer.textContent = data.notes;
          notesContainer.style.display = "block";
        }

        const runs = data.runs || {};
        // Only show runs with query timeline data
        const runNames = Object.keys(runs)
          .filter((name) => hasQueryTimelines(runs[name]))
          .sort();

        updateQueryFilters(runs); // Initialize selected queries first
        updateStats(runs);
        updateLegend(runs);

        // Group runs by chart and track earliest start time per chart
        const runsByChart = {};
        const chartStartTimes = {};
        runNames.forEach((name) => {
          const run = runs[name];
          const chartGroup = run.chart || "default";
          if (!runsByChart[chartGroup]) {
            runsByChart[chartGroup] = [];
            chartStartTimes[chartGroup] = Infinity;
          }
          runsByChart[chartGroup].push(name);
          // Track earliest start time for this chart group
          if (run.startTime && run.startTime < chartStartTimes[chartGroup]) {
            chartStartTimes[chartGroup] = run.startTime;
          }
        });

        // Update latency/hits chart for each dashboard group
        const metricChanged = selectedMetric !== lastMetric;
        const chartTypeChanged = chartType !== lastChartType;
        lastMetric = selectedMetric;
        lastChartType = chartType;

        // Sort chart groups by earliest start time (emission order)
        const chartGroupsSorted = Object.keys(runsByChart).sort((a, b) => {
          const aTime = chartStartTimes[a] || Infinity;
          const bTime = chartStartTimes[b] || Infinity;
          if (aTime === bTime) return a.localeCompare(b);
          return aTime - bTime;
        });
        chartGroupsSorted.forEach((chartGroup) => {
            const chart = getOrCreateChartGroup(
              chartGroup === "default" ? "" : chartGroup,
            );
            const groupRunNames = runsByChart[chartGroup];

            const datasets = [];
            groupRunNames.forEach((name) => {
              const run = runs[name];
              const baseColor = getRunColor(name, run);
              const queries = run.queries || {};
              const queryNames = Object.keys(queries).filter((qn) =>
                selectedQueries.has(qn),
              );

              // Use each run's own start time so scenarios starting later still begin at x=0
              const startTime = run.startTime || 0;

              if (
                queryNames.length === 0 &&
                Object.keys(queries).length === 0
              ) {
                // No query breakdown available, skip this run
              } else {
                // Show each selected query as separate line
                queryNames.forEach((qName, idx) => {
                  const q = queries[qName];
                  // Slightly vary color for multiple queries in same run
                  const color =
                    idx === 0 ? baseColor : shadeColor(baseColor, idx * 15);
                  const timelineData = (q.timeline || []).map((p) => ({
                    x: (p.time - startTime) / 1000,
                    y: chartType === "hits" ? p.hits || 0 : p[selectedMetric],
                  }));
                  datasets.push({
                    datasetKey: `${name}::${qName}`,
                    label: qName,
                    borderColor: color,
                    backgroundColor: color,
                    data: timelineData,
                    // Use scriptable option - checks data length on each render
                    pointRadius: (ctx) => ctx.dataset.data.length === 1 ? 2 : 0,
                  });
                });
              }
            });

            updateChartDatasets(
              chart,
              datasets,
              metricChanged || chartTypeChanged,
            );
            updateChartYAxis(chart);

            // Update y-axis unit based on chart type
            if (chartType === "hits") {
              chart.options.scales.y.ticks.callback = (v) =>
                formatNumber(Math.round(v));
              chart.options.plugins.tooltip.callbacks.label = (ctx) =>
                `${ctx.dataset.label}: ${formatNumber(ctx.parsed.y)}`;
            } else {
              chart.options.scales.y.ticks.callback = (v) =>
                Math.round(v) + "ms";
              chart.options.plugins.tooltip.callbacks.label = (ctx) =>
                `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(2)}ms`;
            }

            chart.update("none");
          });

        // Update CPU/Memory charts from containers data (independent of runs)
        const containers = data.containers || {};

        // Find the run associated with each container
        const getContainerRun = (containerName, container) => {
          const allRuns = Object.values(runs);

          // Prefer exact container-name matches.
          const byContainer = allRuns.filter((run) => run.container === containerName);
          if (byContainer.length === 1) {
            return byContainer[0];
          }
          if (byContainer.length > 1) {
            return byContainer.sort((a, b) => (a.startTime || 0) - (b.startTime || 0))[0];
          }

          // Fallback to backend only when unambiguous.
          const byBackend = allRuns.filter((run) => run.backend === container.backend);
          if (byBackend.length === 1) {
            return byBackend[0];
          }
          return null;
        };

        // Only show containers whose associated run has started (has a startTime)
        const activeContainerNames = Object.keys(containers).filter(name => {
          const container = containers[name];
          const matchingRun = getContainerRun(name, container);
          return matchingRun?.startTime > 0;
        }).sort();

        if (activeContainerNames.length > 0) {
          document.getElementById("metrics-container").style.display = "grid";

          // Find start time for each container based on its associated run
          const getContainerBaseline = (container) => {
            const matchingRun = getContainerRun(container.name, container);
            return matchingRun?.startTime || data.startTime || Date.now();
          };

          const cpuDatasets = activeContainerNames.map((name) => {
            const container = containers[name];
            const color = getContainerColor(name, container);
            const baseline = getContainerBaseline(container);
            const displayName = container.alias || name;
            return {
              datasetKey: `cpu:${name}`,
              label: displayName,
              borderColor: color,
              data: (container.cpu || []).map((p) => ({
                x: (p.time - baseline) / 1000,
                y: p.value,
              })),
            };
          });
          updateChartDatasets(cpuChart, cpuDatasets);
          updateChartYAxis(cpuChart);
          cpuChart.update("none");

          const memoryDatasets = activeContainerNames.map((name) => {
            const container = containers[name];
            const color = getContainerColor(name, container);
            const baseline = getContainerBaseline(container);
            const displayName = container.alias || name;
            return {
              datasetKey: `memory:${name}`,
              label: displayName,
              borderColor: color,
              data: (container.memory || []).map((p) => ({
                x: (p.time - baseline) / 1000,
                y: p.value,
              })),
            };
          });
          updateChartDatasets(memoryChart, memoryDatasets);
          updateChartYAxis(memoryChart);
          memoryChart.update("none");
        }

        // Update ingest chart (only if any run has ingest data)
        // Check all runs, not just those with query timelines
        const runsWithIngest = Object.keys(runs).filter(
          (name) => runs[name].totalIngested > 0,
        );
        if (runsWithIngest.length > 0) {
          document.getElementById("ingest-container").style.display = "grid";
          document.getElementById("ingest-legend").innerHTML = runsWithIngest
            .map((name) => {
              const color = getRunColor(name, runs[name]);
              return `<div class="legend-item"><div class="legend-color" style="background: ${color}"></div> ${escapeHtml(name)}</div>`;
            })
            .join("");

          // Update ingest stats
          const ingestStatsContainer = document.getElementById(
            "ingest-stats-container",
          );
          runsWithIngest.forEach((name) => {
            const run = runs[name];
            const color = getRunColor(name, run);
            const ingestId = safeId(name);
            let el = document.getElementById(`ingest-stat-${ingestId}`);
            if (!el) {
              el = document.createElement("div");
              el.id = `ingest-stat-${ingestId}`;
              el.className = "stat-group";
              el.style.borderLeftColor = color;
              el.innerHTML = `
              <div class="stat-group-header">
                <div class="stat-group-label" style="color: ${color}">${escapeHtml(getBaseName(name))}</div>
              </div>
              <div class="stats" style="grid-template-columns: 1fr 1fr;">
                <div class="stat"><div class="stat-value" id="ingest-${ingestId}-total">0</div><div class="stat-label">Total</div></div>
                <div class="stat"><div class="stat-value" id="ingest-${ingestId}-rate">0</div><div class="stat-label">Rate/s</div></div>
              </div>
            `;
              ingestStatsContainer.appendChild(el);
            }
            document.getElementById(`ingest-${ingestId}-total`).textContent =
              formatNumber(run.totalIngested);
            document.getElementById(`ingest-${ingestId}-rate`).textContent =
              formatNumber(Math.floor(run.avgIngestRate || 0));
          });

          const ingestDatasets = runsWithIngest.map((name) => {
            const run = runs[name];
            const color = getRunColor(name, run);
            // Use each run's own start time so ingest offset is relative to when
            // the run began (same as search charts). This keeps second/third phases
            // visible within the chart's x-axis range.
            const startTime = run.startTime || data.startTime || 0;
            return {
              datasetKey: `ingest:${name}`,
              label: name,
              borderColor: color,
              data: (run.ingestRate || []).map((p) => ({
                x: (p.time - startTime) / 1000,
                y: p.value,
              })),
            };
          });
          updateChartDatasets(ingestChart, ingestDatasets);
          updateChartYAxis(ingestChart);
          ingestChart.update("none");
        }
      }

      if (window.__DASHBOARD_EMBEDDED_DATA) {
        update(window.__DASHBOARD_EMBEDDED_DATA);
      } else {
        const events = new EventSource("/events");
        events.onmessage = (e) => {
          try {
            update(JSON.parse(e.data));
          } catch (err) {
            console.error(err);
          }
        };
      }

      // Force charts to resize when window resizes
      let resizeTimeout;
      window.addEventListener("resize", () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
          getAllCharts().forEach((chart) => {
            chart.resize();
          });
        }, 100);
      });

      // Close modal on escape key
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          hideConfigModal();
        }
      });
    </script>
  </body>
</html>
