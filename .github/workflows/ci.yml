name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Go Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Determine changed Go files
        id: changed-go-files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            FILES=$(git diff --name-only --diff-filter=ACMRT "$BASE_SHA" "$HEAD_SHA" -- '*.go')
          else
            if git rev-parse HEAD~1 >/dev/null 2>&1; then
              FILES=$(git diff --name-only --diff-filter=ACMRT HEAD~1 HEAD -- '*.go')
            else
              FILES=$(git ls-files '*.go')
            fi
          fi

          {
            echo "files<<EOF"
            echo "$FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check gofmt on changed files
        run: |
          FILES="${{ steps.changed-go-files.outputs.files }}"
          if [ -z "$FILES" ]; then
            echo "No changed Go files to check."
            exit 0
          fi

          UNFORMATTED=$(gofmt -l $FILES)
          if [ -n "$UNFORMATTED" ]; then
            echo "The following files are not gofmt'd:"
            echo "$UNFORMATTED"
            exit 1
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Determine lint base revision
        id: lint-base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "rev=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          elif git rev-parse HEAD~1 >/dev/null 2>&1; then
            echo "rev=HEAD~1" >> "$GITHUB_OUTPUT"
          else
            echo "rev=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run lint
        run: |
          REV="${{ steps.lint-base.outputs.rev }}"
          if [ -n "$REV" ]; then
            golangci-lint run --new-from-rev "$REV"
          else
            golangci-lint run
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: make test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Go binaries
        run: |
          make loader
          make viewer

      - name: Build k6 extension binary
        env:
          GOTOOLCHAIN: auto
        run: make k6
